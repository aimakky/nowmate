# YVOICE Playwright E2E smoke tests
#
# 目的:
#   - PR / main push のたびに、LP・公開ページ・middleware の auth-redirect・
#     スマホ viewport が壊れていないかを自動チェックする。
#
# 設計方針:
#   1. このフェーズでは「軽いスモークテストのみ」。
#      認証突破 / DB 書き込み / Stripe / Twilio / LiveKit には一切触らない。
#   2. Supabase env は実在しないダミードメインを inject する。
#      middleware は env がダミーでも空文字 fallback で起動し、auth.getUser() が
#      null を返すので保護ルートは /login へ redirect される。
#      → 本番 / staging Supabase に絶対に接続しない。
#   3. Chromium のみ。WebKit / Firefox は初期段階では入れない (CI 負荷削減)。
#   4. CI 環境では playwright.config.ts が `npm run start` (production server) を
#      起動するため、先に `npm run build` を実行する必要がある。
#   5. 失敗時は playwright-report / test-results を artifact として保存。

name: Playwright E2E (smoke)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一 PR 内で複数 push があった時は古い run をキャンセルして CI 時間を節約
concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # ⚠ 本番 / staging Supabase には絶対に向けない。
      # playwright-test.invalid は予約 TLD で、ネットワーク層で名前解決が失敗する。
      # middleware が空文字 fallback で起動し、保護ルートは /login へ redirect される設計。
      NEXT_PUBLIC_SUPABASE_URL: https://playwright-test.invalid
      NEXT_PUBLIC_SUPABASE_ANON_KEY: playwright-test-fake-anon-key
      # Next.js / Playwright の CI フラグ
      CI: true
      # Next.js のテレメトリは無効化 (CI で外部送信しない)
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build (Next.js production)
        run: npm run build

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test-results (traces / screenshots / videos) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
