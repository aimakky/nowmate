# YVOICE Playwright E2E smoke tests
#
# 目的:
#   - PR / main push のたびに、LP・公開ページ・middleware の auth-redirect・
#     スマホ viewport が壊れていないかを自動チェックする。
#
# 設計方針:
#   1. このフェーズでは「軽いスモークテストのみ」。
#      認証突破 / DB 書き込み / Stripe / Twilio / LiveKit には一切触らない。
#   2. Supabase env は localhost (127.0.0.1:54321) を指す。同ポートで
#      tests/e2e/mock-supabase-server.js を起動し、すべての Supabase fetch に
#      対して即 401 を返す。これで supabase-js が undici 内部 retry に巻き込まれず、
#      server-side query が ms オーダーで「未認証」状態を取得できる。
#      → 本番 / staging Supabase に絶対に接続しない (localhost で完結)。
#   3. Chromium のみ。WebKit / Firefox は初期段階では入れない (CI 負荷削減)。
#   4. CI 環境では playwright.config.ts が `npm run start` (production server) を
#      起動するため、先に `npm run build` を実行する必要がある。
#   5. 失敗時は playwright-report / test-results を artifact として保存。

name: Playwright E2E (smoke)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一 PR 内で複数 push があった時は古い run をキャンセルして CI 時間を節約
concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # ⚠ 本番 / staging Supabase には絶対に向けない。
      # 127.0.0.1:54321 は localhost に閉じる。Playwright が webServer 経由で
      # tests/e2e/mock-supabase-server.js を起動し、すべての Supabase fetch に
      # 対して即 401 を返す (ローカル検証で server-side query が 7s → 30ms に短縮)。
      # 過去には dummy URL に .invalid TLD や到達不能ホストを使ったが、
      # supabase-js / undici の内部リトライで各ページ応答が 7s 待たされ、
      # 56 件のスモークが連鎖タイムアウトしていた。
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: playwright-test-fake-anon-key
      # Next.js / Playwright の CI フラグ
      CI: true
      # Next.js のテレメトリは無効化 (CI で外部送信しない)
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build (Next.js production)
        run: npm run build

      - name: Sanity check mock Supabase server
        # mock-supabase-server.js が起動できる / 401 を返すことを確認する。
        # 本番の test:e2e でも Playwright が webServer 経由で起動するので
        # ここは smoke 確認のみ (起動して即 kill)。
        run: |
          set -e
          node tests/e2e/mock-supabase-server.js &
          MOCK_PID=$!
          # listen 待ち (最大 5 秒)
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:54321/ | grep -q '^401$'; then
              echo "✓ mock-supabase-server returned 401 as expected"
              break
            fi
            sleep 1
          done
          # 念のため最終確認
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:54321/auth/v1/user || echo '000')
          echo "Final status check: $STATUS"
          kill $MOCK_PID 2>/dev/null || true
          wait 2>/dev/null || true
          if [ "$STATUS" != "401" ]; then
            echo "❌ mock-supabase-server did not return 401 (got $STATUS)"
            exit 1
          fi

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Dump Playwright failure context (on failure)
        # CI ログだけで失敗原因が分かるよう、test-results 配下の error-context.md /
        # stderr.txt / stdout.txt を全部 stdout に流す。artifact ダウンロードが
        # 必要にならないよう、ここで完結させる。
        if: failure()
        run: |
          set +e
          echo "===================================================================="
          echo "  TEST-RESULTS TREE"
          echo "===================================================================="
          if [ -d test-results ]; then
            find test-results -maxdepth 3 -type f | sort
          else
            echo "(test-results directory not found)"
          fi
          echo ""
          for ctx in $(find test-results -name 'error-context.md' 2>/dev/null | sort); do
            echo "===================================================================="
            echo "  $ctx"
            echo "===================================================================="
            cat "$ctx" || true
            echo ""
          done
          for log in $(find test-results -name 'stderr.txt' -o -name 'stdout.txt' 2>/dev/null | sort); do
            echo "===================================================================="
            echo "  $log"
            echo "===================================================================="
            head -200 "$log" || true
            echo ""
          done
          echo "===================================================================="
          echo "  PLAYWRIGHT REPORT SUMMARY"
          echo "===================================================================="
          if [ -f playwright-report/index.html ]; then
            echo "(playwright-report/index.html exists, $(wc -c < playwright-report/index.html) bytes)"
          fi

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test-results (traces / screenshots / videos) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
