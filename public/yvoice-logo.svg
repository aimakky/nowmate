<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" width="800" height="950">
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.55" stop-color="#9D5CFF"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 透過背景。OG カードや LP の任意箇所に重ねやすいように背景なし -->
  <!-- Y マーク (中央配置、64x64 の YVoiceIcon を 5 倍にスケール) -->
  <g transform="translate(0 20) scale(5)">
    <rect x="29.5" y="32" width="5" height="22" rx="1.2" fill="url(#p)"/>
    <g transform="translate(32 32) rotate(-25)">
      <rect x="-2.5" y="-8" width="5" height="14" rx="1.2" fill="url(#p)"/>
      <rect x="-8" y="-22" width="16" height="16" rx="8" fill="url(#p)"/>
      <rect x="-4.5" y="-19" width="9" height="1.1" rx="0.55" fill="#0a0a18" opacity="0.55"/>
      <rect x="-4.5" y="-16.5" width="9" height="1.1" rx="0.55" fill="#0a0a18" opacity="0.55"/>
      <rect x="-4.5" y="-14" width="9" height="1.1" rx="0.55" fill="#0a0a18" opacity="0.55"/>
    </g>
    <g transform="translate(32 32) rotate(25)">
      <rect x="-2.5" y="-8" width="5" height="14" rx="1.2" fill="url(#p)"/>
      <rect x="-8" y="-22" width="16" height="16" rx="8" fill="url(#p)"/>
      <rect x="-4.5" y="-19" width="9" height="1.1" rx="0.55" fill="#0a0a18" opacity="0.55"/>
      <rect x="-4.5" y="-16.5" width="9" height="1.1" rx="0.55" fill="#0a0a18" opacity="0.55"/>
      <rect x="-4.5" y="-14" width="9" height="1.1" rx="0.55" fill="#0a0a18" opacity="0.55"/>
    </g>
  </g>
  <!-- YVOICE 文字 (Y は紫 #9D5CFF、VOICE は白 #F0EEFF) -->
  <text x="160" y="355" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="900" font-size="56" letter-spacing="3"
        fill="#F0EEFF">
    <tspan fill="#9D5CFF">Y</tspan>VOICE
  </text>
</svg>
